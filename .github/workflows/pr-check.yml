name: PR Check

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Restore
      run: dotnet restore Qourex.FasterWhisper.slnx

    - name: Check formatting
      run: dotnet format Qourex.FasterWhisper.slnx --verify-no-changes --verbosity diagnostic

    - name: Build (Debug)
      run: dotnet build Qourex.FasterWhisper.slnx -c Debug --no-restore

    - name: Run unit tests
      run: dotnet test tests/Qourex.FasterWhisper.NET.Tests/Qourex.FasterWhisper.NET.Tests.csproj -c Debug --no-build --filter "Category!=Integration" --collect:"XPlat Code Coverage"
