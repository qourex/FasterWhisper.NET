name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # =========================================================================
  # JOB 1: Build Native C++ Wrapper for Windows, Linux, and macOS
  # =========================================================================
  build-native:
    name: Build Native (${{ matrix.os }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-latest
            cmake_flags: "-DWITH_CUDA=OFF -DWITH_CUDNN=OFF -DWITH_MKL=OFF -DWITH_OPENBLAS=ON -DOPENMP_RUNTIME=COMP -DCMAKE_POLICY_VERSION_MINIMUM=3.5"
            artifact_name: "native-linux-x64"
            binary_files: "qourex_fasterwhisper_native.so,_deps/ctranslate2-build/libctranslate2.so"

          - os: osx
            arch: x64
            runner: macos-15-intel # Intel Mac runner
            cmake_flags: "-DWITH_CUDA=OFF -DWITH_CUDNN=OFF -DWITH_MKL=OFF -DCMAKE_OSX_ARCHITECTURES=x86_64 -DOPENMP_RUNTIME=NONE -DCMAKE_POLICY_VERSION_MINIMUM=3.5"
            artifact_name: "native-osx-x64"
            binary_files: "qourex_fasterwhisper_native.dylib,_deps/ctranslate2-build/libctranslate2.dylib"

          - os: osx
            arch: arm64
            runner: macos-latest # Apple Silicon Mac runner
            cmake_flags: "-DWITH_CUDA=OFF -DWITH_CUDNN=OFF -DWITH_MKL=OFF -DCMAKE_OSX_ARCHITECTURES=arm64 -DOPENMP_RUNTIME=NONE -DCMAKE_POLICY_VERSION_MINIMUM=3.5"
            artifact_name: "native-osx-arm64"
            binary_files: "qourex_fasterwhisper_native.dylib,_deps/ctranslate2-build/libctranslate2.dylib"

          - os: android
            arch: arm64
            runner: ubuntu-latest
            cmake_flags: "-DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 -DWITH_CUDA=OFF -DWITH_CUDNN=OFF -DWITH_MKL=OFF -DWITH_OPENBLAS=OFF -DWITH_EIGEN=ON -DOPENMP_RUNTIME=NONE -DCMAKE_POLICY_VERSION_MINIMUM=3.5"
            artifact_name: "native-android-arm64"
            binary_files: "qourex_fasterwhisper_native.so,_deps/ctranslate2-build/libctranslate2.so"

          - os: ios
            arch: arm64
            runner: macos-latest
            cmake_flags: "-DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64 -DWITH_CUDA=OFF -DWITH_CUDNN=OFF -DWITH_MKL=OFF -DWITH_OPENBLAS=OFF -DWITH_ACCELERATE=ON -DOPENMP_RUNTIME=NONE -DCMAKE_POLICY_VERSION_MINIMUM=3.5"
            artifact_name: "native-ios-arm64"
            binary_files: "qourex_fasterwhisper_native.dylib,_deps/ctranslate2-build/libctranslate2.dylib"

    steps:
    - uses: actions/checkout@v4

    - name: Install System Dependencies (Linux)
      if: matrix.os == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libopenblas-dev

    - name: Configure CMake
      run: |
        mkdir native_build
        cd native_build
        cmake ../src/Qourex.FasterWhisper.Native -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

    - name: Build Shared Libraries
      run: |
        cd native_build
        cmake --build . --config Release

    - name: Stage Native Artifacts
      shell: pwsh
      run: |
        mkdir staged_binaries
        $files = "${{ matrix.binary_files }}".Split(",")
        foreach ($file in $files) {
          $sourcePath = Join-Path "native_build" $file
          if (Test-Path $sourcePath) {
            Copy-Item -Path $sourcePath -Destination "staged_binaries" -Force
          } else {
            throw "Required binary file not found: $sourcePath"
          }
        }

    - name: Upload Native Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: staged_binaries/
        retention-days: 1

  # =========================================================================
  # JOB 2: Pack and Publish Multi-Platform NuGet Package
  # =========================================================================
  pack-and-publish:
    name: Package & Publish NuGet
    needs: build-native
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Extract Release Version
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.version }}"
          $tag = $version
          if ($version -match '^[0-9]') {
            $tag = "v$version"
          }
          $version = $version -replace '^v', ''
        } else {
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $tag = "${{ github.ref_name }}"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "TAG=$tag" >> $env:GITHUB_OUTPUT

    - name: Download Linux-x64 Native Binaries
      uses: actions/download-artifact@v4
      with:
        name: native-linux-x64
        path: src/Qourex.FasterWhisper.NET/runtimes/linux-x64/native

    - name: Download OSX-x64 Native Binaries
      uses: actions/download-artifact@v4
      with:
        name: native-osx-x64
        path: src/Qourex.FasterWhisper.NET/runtimes/osx-x64/native

    - name: Download OSX-Arm64 Native Binaries
      uses: actions/download-artifact@v4
      with:
        name: native-osx-arm64
        path: src/Qourex.FasterWhisper.NET/runtimes/osx-arm64/native

    - name: Download Android-Arm64 Native Binaries
      uses: actions/download-artifact@v4
      with:
        name: native-android-arm64
        path: src/Qourex.FasterWhisper.NET/runtimes/android-arm64/native

    - name: Download iOS-Arm64 Native Binaries
      uses: actions/download-artifact@v4
      with:
        name: native-ios-arm64
        path: src/Qourex.FasterWhisper.NET/runtimes/ios-arm64/native

    - name: Restore dependencies
      run: dotnet restore Qourex.FasterWhisper.slnx

    - name: Build Managed Assemblies
      run: dotnet build Qourex.FasterWhisper.slnx -c Release /p:Version=${{ steps.version.outputs.VERSION }} /p:IncludeMobileTargets=true

    - name: Run unit tests
      run: dotnet test tests/Qourex.FasterWhisper.NET.Tests/Qourex.FasterWhisper.NET.Tests.csproj -c Release --no-build --filter "Category!=Integration"

    - name: Pack Cross-Platform NuGet (CPU)
      run: dotnet pack src/Qourex.FasterWhisper.NET/Qourex.FasterWhisper.NET.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} /p:IncludeMobileTargets=true -o ./artifacts

    # Note: GPU version packs the committed Windows and Linux CUDA binaries from its runtimes directory
    - name: Pack GPU NuGet (Windows & Linux CUDA)
      shell: bash
      run: |
        cp README_GPU.md src/Qourex.FasterWhisper.NET.Gpu/README.md
        cp THIRD_PARTY_NOTICES.md src/Qourex.FasterWhisper.NET.Gpu/
        cp CHANGELOG.md src/Qourex.FasterWhisper.NET.Gpu/
        dotnet pack src/Qourex.FasterWhisper.NET.Gpu/Qourex.FasterWhisper.NET.Gpu.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} /p:IncludeMobileTargets=true -o ./artifacts

    - name: NuGet Login (OIDC Trusted Publishing)
      uses: NuGet/login@v1
      id: login
      with:
        user: cybowolf

    - name: Push to NuGet
      run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.TAG }}
        generate_release_notes: true
        files: |
          ./artifacts/*.nupkg
          ./artifacts/*.snupkg
